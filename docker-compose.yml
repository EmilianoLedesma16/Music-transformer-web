services:
  db:
    image: postgres:15
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: music_transformer
      POSTGRES_USER: mtuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtuser -d music_transformer"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./services/api
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - ./frontend:/app/frontend
      - shared_data:/app/data
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: on-failure

  ml_worker:
    build: ./services/ml_worker
    env_file: .env
    environment:
      PYTHONPATH: "/app"
    volumes:
      - shared_data:/app/data
      - panns_data:/root/panns_data    # persiste el checkpoint CNN14 (~325 MB)
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: on-failure

  transcription_worker:
    build: ./services/transcription_worker
    env_file: .env
    environment:
      PYTHONPATH: "/app/mt_src:/app"
    volumes:
      - shared_data:/app/data
      - ./music-transformer/src:/app/mt_src
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: on-failure

  generation_worker:
    build: ./services/generation_worker
    env_file: .env
    environment:
      PYTHONPATH: "/app/mt_src:/app"
      STUB_GENERATION: "false"
    volumes:
      - shared_data:/app/data
      - ./music-transformer/checkpoints:/app/checkpoints
      - ./music-transformer/src:/app/mt_src
      - ./music-transformer/data/tokens:/app/mt_data/tokens
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: on-failure

volumes:
  postgres_data:
  shared_data:
  panns_data:
