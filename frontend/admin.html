<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ByteBeat — Administración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="/static/css/app.css"/>
  <style>
    .user-row {
      background: rgba(18,18,18,.75);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: .75rem;
      transition: border-color .2s;
    }
    .user-row:hover { border-color: rgba(246,178,107,.2); }
    .role-badge {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      padding: .25em .6em; border-radius: .4rem; letter-spacing: .04em;
    }
    .role-admin { background: rgba(246,178,107,.18); color: var(--wood-amber); border: 1px solid rgba(246,178,107,.35); }
    .role-user  { background: rgba(255,255,255,.07); color: rgba(255,255,255,.5); border: 1px solid rgba(255,255,255,.12); }
  </style>
</head>
<body>

  <nav class="navbar navbar-wood navbar-dark sticky-top">
    <div class="container">
      <div class="d-flex align-items-center gap-2">
        <img src="/static/img/logo.png" alt="ByteBeat" height="36" onerror="this.style.display='none'"/>
        <strong class="text-white fs-5">ByteBeat</strong>
        <span class="text-white-50 small ms-1">/ Admin</span>
      </div>
      <div class="d-flex align-items-center gap-3">
        <a href="/dashboard.html" class="btn btn-glass btn-sm">
          <i class="bi bi-arrow-left me-1"></i>Dashboard
        </a>
        <button class="btn btn-glass btn-sm" id="logoutBtn">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </div>
    </div>
  </nav>

  <main class="container py-5" style="max-width:860px;">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h2 class="text-white mb-0">Usuarios</h2>
        <p class="text-soft small mb-0">Gestión de roles y accesos</p>
      </div>
      <button class="btn btn-glass btn-sm" id="refreshBtn">
        <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
      </button>
    </div>

    <div id="accessDenied" class="d-none">
      <div class="alert alert-danger">
        <i class="bi bi-shield-x me-2"></i>
        No tienes permisos de administrador. Pide a un admin que te asigne el rol.
      </div>
      <a href="/dashboard.html" class="btn btn-glass">Volver al dashboard</a>
    </div>

    <div id="loadingState" class="text-center py-5">
      <div class="spinner-border text-warning" role="status"></div>
      <p class="text-soft mt-3">Cargando usuarios…</p>
    </div>

    <div id="userList" class="d-flex flex-column gap-3 d-none"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    Auth.requireAuth();
    document.getElementById("logoutBtn").addEventListener("click", Auth.logout);
    document.getElementById("refreshBtn").addEventListener("click", loadUsers);

    function roleBadge(role) {
      return role === "admin"
        ? `<span class="role-badge role-admin"><i class="bi bi-shield-fill me-1"></i>Admin</span>`
        : `<span class="role-badge role-user"><i class="bi bi-person me-1"></i>Usuario</span>`;
    }

    function renderUser(u, currentId) {
      const date = new Date(u.created_at).toLocaleDateString("es-MX", { dateStyle: "medium" });
      const isSelf = u.id === currentId;
      const avatar = u.avatar_url
        ? `<img src="${u.avatar_url}" class="rounded-circle me-2" width="32" height="32" style="object-fit:cover;"/>`
        : `<span class="me-2 d-inline-flex align-items-center justify-content-center rounded-circle bg-secondary text-white" style="width:32px;height:32px;font-size:.8rem;">${(u.name||u.email)[0].toUpperCase()}</span>`;

      return `
      <div class="user-row p-3 d-flex align-items-center gap-3 flex-wrap" id="user-${u.id}">
        <div class="d-flex align-items-center gap-2 flex-grow-1 min-w-0">
          ${avatar}
          <div class="min-w-0">
            <p class="text-white fw-semibold mb-0 text-truncate">${u.name || "(sin nombre)"}</p>
            <p class="text-soft small mb-0 text-truncate">${u.email}</p>
          </div>
        </div>
        <div class="d-flex align-items-center gap-3 flex-shrink-0">
          <span id="badge-${u.id}">${roleBadge(u.role)}</span>
          <small class="text-soft d-none d-md-inline">${date}</small>
          ${isSelf ? '<span class="text-soft small">(tú)</span>' : `
          <button class="btn btn-glass btn-sm toggle-role-btn"
            data-id="${u.id}" data-role="${u.role}">
            ${u.role === "admin" ? "Quitar admin" : "Hacer admin"}
          </button>`}
        </div>
      </div>`;
    }

    let currentUserId = null;

    async function loadUsers() {
      document.getElementById("loadingState").classList.remove("d-none");
      document.getElementById("userList").classList.add("d-none");
      document.getElementById("accessDenied").classList.add("d-none");

      try {
        const [users, me] = await Promise.all([API.adminListUsers(), API.getMe()]);
        currentUserId = me.id;

        document.getElementById("loadingState").classList.add("d-none");
        const list = document.getElementById("userList");
        list.innerHTML = users.map(u => renderUser(u, currentUserId)).join("");
        list.classList.remove("d-none");
        attachToggleListeners();
      } catch (err) {
        document.getElementById("loadingState").classList.add("d-none");
        if (err.message.includes("403") || err.message.toLowerCase().includes("admin")) {
          document.getElementById("accessDenied").classList.remove("d-none");
        } else {
          document.getElementById("loadingState").innerHTML =
            `<p class="text-danger"><i class="bi bi-exclamation-circle me-1"></i>${err.message}</p>`;
          document.getElementById("loadingState").classList.remove("d-none");
        }
      }
    }

    function attachToggleListeners() {
      document.querySelectorAll(".toggle-role-btn").forEach(btn => {
        btn.onclick = async () => {
          const userId  = parseInt(btn.dataset.id, 10);
          const curRole = btn.dataset.role;
          const newRole = curRole === "admin" ? "user" : "admin";

          btn.disabled = true;
          btn.textContent = "Guardando…";

          try {
            await API.adminSetRole(userId, newRole);
            // Update badge and button in-place
            document.getElementById(`badge-${userId}`).innerHTML = roleBadge(newRole);
            btn.dataset.role  = newRole;
            btn.disabled      = false;
            btn.textContent   = newRole === "admin" ? "Quitar admin" : "Hacer admin";
          } catch (err) {
            btn.disabled = false;
            btn.textContent = curRole === "admin" ? "Quitar admin" : "Hacer admin";
            alert(err.message);
          }
        };
      });
    }

    loadUsers();
  </script>
</body>
</html>
