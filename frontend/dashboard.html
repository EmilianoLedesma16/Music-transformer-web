<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ByteBeat — Mis Creaciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bb-navbar px-3">
    <span class="navbar-brand fw-bold bb-brand">ByteBeat</span>
    <div class="d-flex align-items-center gap-3">
      <span class="text-white small" id="navUser"></span>
      <a href="/create.html" class="btn btn-sm btn-primary">
        <i class="bi bi-plus-lg me-1"></i>Nueva creación
      </a>
      <button class="btn btn-sm btn-outline-light" id="logoutBtn">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="mb-4">Mis Creaciones</h2>

    <div id="loadingSpinner" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div id="emptyState" class="text-center py-5 d-none">
      <i class="bi bi-music-note-beamed display-3 text-muted"></i>
      <p class="mt-3 text-muted">Aún no tienes creaciones.<br>
        <a href="/create.html">¡Crea tu primer acompañamiento!</a>
      </p>
    </div>

    <div id="creacionesList" class="row g-3 d-none"></div>
  </div>

  <!-- Template de tarjeta -->
  <template id="cardTemplate">
    <div class="col-md-6 col-lg-4">
      <div class="card h-100 shadow-sm bb-card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h6 class="card-title text-truncate mb-0 me-2 filename"></h6>
            <span class="badge status-badge"></span>
          </div>
          <div class="d-flex gap-2 flex-wrap mb-3">
            <span class="badge bg-secondary genre-badge"></span>
            <span class="badge bg-info text-dark mood-badge"></span>
            <span class="badge bg-warning text-dark instrument-badge"></span>
          </div>
          <p class="card-text small text-muted created-at"></p>

          <div class="output-links d-none">
            <div class="d-flex gap-2 flex-wrap">
              <a class="btn btn-sm btn-outline-primary midi-link" href="#" target="_blank">
                <i class="bi bi-file-music me-1"></i>MIDI
              </a>
              <a class="btn btn-sm btn-outline-success xml-link" href="#" target="_blank">
                <i class="bi bi-file-earmark-music me-1"></i>Partitura
              </a>
            </div>
            <p class="text-muted small mt-1 notes-info"></p>
          </div>

          <div class="error-block d-none">
            <p class="text-danger small error-msg mb-0"></p>
          </div>
        </div>
        <div class="card-footer d-flex justify-content-end">
          <button class="btn btn-sm btn-outline-danger delete-btn">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
    </div>
  </template>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
