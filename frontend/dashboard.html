<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ByteBeat — Mis creaciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="/static/css/app.css"/>
  <style>
    .creacion-card {
      background: rgba(18,18,18,.75);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 1rem;
      transition: border-color .2s;
    }
    .creacion-card:hover { border-color: rgba(246,178,107,.3); }
    .badge-status {
      font-size: .72rem;
      padding: .3em .65em;
      border-radius: .5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .spinner-wood {
      width: 1.25rem; height: 1.25rem;
      border: 2px solid rgba(246,178,107,.3);
      border-top-color: var(--wood-amber);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { opacity: .55; }
  </style>
</head>
<body>

  <nav class="navbar navbar-wood navbar-dark sticky-top">
    <div class="container">
      <div class="d-flex align-items-center gap-2">
        <img src="/static/img/logo.png" alt="ByteBeat" height="36" onerror="this.style.display='none'"/>
        <strong class="text-white fs-5">ByteBeat</strong>
      </div>
      <div class="d-flex align-items-center gap-3">
        <a href="/create.html" class="btn btn-wood btn-sm px-3">
          <i class="bi bi-plus-lg me-1"></i>Nueva creación
        </a>
        <span id="userGreeting" class="text-white-50 small d-none d-md-inline"></span>
        <button class="btn btn-glass btn-sm" id="logoutBtn">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <h2 class="text-white mb-0">Mis creaciones</h2>
      <button class="btn btn-glass btn-sm" id="refreshBtn">
        <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
      </button>
    </div>

    <div id="loadingState" class="text-center py-5">
      <div class="spinner-wood mx-auto mb-3"></div>
      <p class="text-soft">Cargando creaciones…</p>
    </div>

    <div id="emptyState" class="empty-state text-center py-5 d-none">
      <i class="bi bi-music-note-beamed display-4 text-amber mb-3 d-block"></i>
      <h5 class="text-white">Aún no tienes creaciones</h5>
      <p class="text-soft">Sube un audio y genera tu primer acompañamiento.</p>
      <a href="/create.html" class="btn btn-wood px-4">Crear ahora</a>
    </div>

    <div id="creacionesGrid" class="row g-3 d-none"></div>
  </main>

  <!-- Delete confirm modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="background:#1a1a1a; border:1px solid rgba(255,255,255,.1);">
        <div class="modal-header border-0">
          <h5 class="modal-title text-white">Eliminar creación</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-soft">¿Seguro que quieres eliminar esta creación? Esta acción no se puede deshacer.</div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-glass" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
