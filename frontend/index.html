<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ByteBeat — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="bb-auth-body">

  <div class="bb-auth-card card shadow-lg">
    <div class="card-body p-4 p-md-5">

      <div class="text-center mb-4">
        <h1 class="fs-2 fw-bold bb-brand">ByteBeat</h1>
        <p class="text-muted">Generación de acompañamientos con IA</p>
      </div>

      <!-- Pestañas Login / Registro -->
      <ul class="nav nav-pills nav-fill mb-4" id="authTabs">
        <li class="nav-item">
          <button class="nav-link active" data-tab="login">Iniciar sesión</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-tab="register">Registrarse</button>
        </li>
      </ul>

      <!-- Alerta global -->
      <div id="authAlert" class="alert d-none" role="alert"></div>

      <!-- ── Login ── -->
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-primary w-100" id="loginBtn">
          Entrar
        </button>
      </form>

      <!-- ── Registro ── -->
      <form id="registerForm" class="d-none">
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" name="name" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control" minlength="6" required />
        </div>
        <button type="submit" class="btn btn-success w-100" id="registerBtn">
          Crear cuenta
        </button>
      </form>

      <hr class="my-4" />

      <a href="/auth/google" class="btn btn-outline-dark w-100">
        <i class="bi bi-google me-2"></i>Continuar con Google
      </a>

    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    // Si ya hay token válido, ir directo al dashboard
    if (localStorage.getItem('bb_token')) {
      window.location.href = '/dashboard.html';
    }

    // Tabs
    document.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('loginForm').classList.toggle('d-none', tab !== 'login');
        document.getElementById('registerForm').classList.toggle('d-none', tab !== 'register');
        document.getElementById('authAlert').classList.add('d-none');
      });
    });

    function showAlert(msg, type = 'danger') {
      const el = document.getElementById('authAlert');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Entrando...';
      const data = Object.fromEntries(new FormData(e.target));
      const res = await apiFetch('/auth/login', { method: 'POST', json: data });
      btn.disabled = false; btn.textContent = 'Entrar';
      if (res.ok) {
        const body = await res.json();
        Auth.saveToken(body.access_token, body.user);
        window.location.href = '/dashboard.html';
      } else {
        const err = await res.json().catch(() => ({}));
        showAlert(err.detail || 'Credenciales inválidas');
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.disabled = true; btn.textContent = 'Creando cuenta...';
      const data = Object.fromEntries(new FormData(e.target));
      const res = await apiFetch('/auth/register', { method: 'POST', json: data });
      btn.disabled = false; btn.textContent = 'Crear cuenta';
      if (res.ok) {
        const body = await res.json();
        Auth.saveToken(body.access_token, body.user);
        window.location.href = '/dashboard.html';
      } else {
        const err = await res.json().catch(() => ({}));
        showAlert(err.detail || 'Error al registrarse');
      }
    });
  </script>
</body>
</html>
